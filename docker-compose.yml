services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-channelbot}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
      - ./logs:/app/logs
      - ./profiles:/app/profiles
    command: ["npm", "start"]
