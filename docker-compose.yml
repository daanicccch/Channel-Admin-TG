services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-channelbot}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - type: bind
        source: ./.env
        target: /app/.env
      - type: bind
        source: ${DATA_DIR:-./data}
        target: /app/data
      - type: bind
        source: ${LOGS_DIR:-./logs}
        target: /app/logs
      - type: bind
        source: ${PROFILES_DIR:-./profiles}
        target: /app/profiles
    command: ["npm", "start"]
